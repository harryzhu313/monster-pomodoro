<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>番茄钟 · 悬浮</title>
  <link rel="stylesheet" href="float.css">
</head>
<body>
  <div class="float">
    <div class="phase-line">
      <span class="phase-label" id="phase-label">准备开始</span>
      <span class="task-name" id="task-name"></span>
    </div>
    <div class="timer" id="timer">25:00</div>
    <div class="buttons">
      <button id="btn-primary" class="btn btn-primary">开始</button>
      <button id="btn-skip" class="btn btn-secondary" disabled title="跳过专注（休息阶段不可跳过）">跳过</button>
      <button id="btn-pip" class="btn btn-pin" title="置顶悬浮在所有应用之上（需 Chrome 116+）">📌</button>
    </div>
  </div>
  <script src="float.js"></script>
</body>
</html>
