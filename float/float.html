<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>番茄钟 · 悬浮</title>
  <link rel="stylesheet" href="float.css">
</head>
<body>
  <div class="float">
    <div class="phase-line">
      <span class="phase-label" id="phase-label">准备开始</span>
      <span class="task-name" id="task-name"></span>
    </div>
    <img id="mini-monster" class="mini-monster" alt="" />
    <div class="timer" id="timer">25:00</div>
    <div class="buttons">
      <button id="btn-primary" class="btn btn-primary">开始</button>
      <button id="btn-abandon" class="btn btn-secondary" disabled title="放弃本次专注，记一颗烂番茄">放弃</button>
      <button id="btn-pip" class="btn btn-pin" title="置顶悬浮在所有应用之上（需 Chrome 116+）">📌</button>
      <button id="btn-mini" class="btn btn-mini" title="最小化为纯数字">—</button>
    </div>
    <button id="btn-expand" class="btn-expand" title="展开" aria-label="展开">⤢</button>
  </div>
  <script src="float.js"></script>
</body>
</html>
