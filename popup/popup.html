<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>番茄钟</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <section class="timer-card">
      <img id="monster" class="monster" alt="" />
      <div class="phase-label" id="phase-label">准备开始</div>
      <div class="timer" id="timer">25:00</div>
      <div class="buttons">
        <button id="btn-primary" class="btn btn-primary">开始专注</button>
        <button id="btn-abandon" class="btn btn-secondary" disabled title="放弃本次专注，记一颗烂番茄">放弃</button>
        <button id="btn-reset" class="btn btn-ghost">重置</button>
      </div>
      <div class="quota" id="quota" title="双击重置今日配额（仅测试）">今日剩 3/3</div>
    </section>

    <section class="harvest-card">
      <div class="harvest-label">今日收获</div>
      <div class="harvest-icons" id="harvest-icons"></div>
      <div class="streak" id="streak">🔥 已连续 0 天</div>
    </section>

    <section class="tasks-card">
      <header class="tasks-header">
        <span class="tasks-title">今日任务</span>
        <span class="tasks-count" id="tasks-count">0 个完成</span>
      </header>

      <form class="task-add" id="task-add-form">
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="比如：内参阅读"
          maxlength="40"
          autocomplete="off"
        />
        <input
          type="number"
          id="task-planned"
          class="task-planned-input"
          min="1"
          max="20"
          value="1"
          title="计划番茄数"
        />
        <button type="submit" class="btn btn-primary btn-sm">添加</button>
      </form>

      <ul class="task-list" id="task-list"></ul>
      <div class="task-empty" id="task-empty">还没有任务，先加一个吧。</div>
    </section>

    <div class="footer-row">
      <button id="btn-float" class="btn-ghost">🪟 悬浮</button>
      <button id="btn-options" class="btn-ghost">⚙ 设置</button>
    </div>
    <div class="hint" id="hint">按时停下来，比多做一轮重要。</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
